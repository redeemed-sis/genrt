name = "kernel-contract"
suite = "kernel-contract"
supervisor = "kernel"
profile = "debug"
log_level = "info"
kernel_features = ["qemu-test-kernel-runtime"]
init = "kernel-contract"
timeout_secs = 45
step_timeout_secs = 15

[[steps]]
action = "expect_case"
producer = "kernel"
subject = "sleep-deadline"

[[steps]]
action = "expect_case"
producer = "kernel"
subject = "mailbox-blocked-wakeup"

[[steps]]
action = "expect_case"
producer = "kernel"
subject = "mailbox-timeout"

[[steps]]
action = "expect_case"
producer = "kernel"
subject = "thread-join"

[[steps]]
action = "expect_case"
producer = "kernel"
subject = "scheduler-transition-cycle"

[[steps]]
action = "expect_case"
producer = "kernel"
subject = "ready-queue-no-duplicates"

[[steps]]
action = "expect_case"
producer = "kernel"
subject = "blocked-wake-once"

[[steps]]
action = "expect_case"
producer = "kernel"
subject = "thread-slot-reuse"

[[steps]]
action = "expect_case"
producer = "kernel"
subject = "timer-preemption"

[[steps]]
action = "expect_case"
producer = "kernel"
subject = "preempt-lock-keeps-irqs-enabled"

[[steps]]
action = "expect_case"
producer = "kernel"
subject = "deferred-reschedule-after-unlock"

[[steps]]
action = "expect_case"
producer = "kernel"
subject = "nested-preempt-guard"

[[steps]]
action = "expect_case"
producer = "kernel"
subject = "irq-masked-unlock-preserves-pending"

[[steps]]
action = "expect_case"
producer = "kernel"
subject = "deferred-wakeup"

[[steps]]
action = "expect_case"
producer = "kernel"
subject = "yield-inside-preempt-guard"

[[steps]]
action = "expect_case"
producer = "kernel"
subject = "allocator-preemption-lifecycle"

[[steps]]
action = "expect_case"
producer = "kernel"
subject = "post-test-liveness"
