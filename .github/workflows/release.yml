name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-and-package:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install dependencies
        run: scripts/ci/install-ubuntu-deps.sh
      - name: Cache Cargo downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-rust-1.95.0-${{ hashFiles('Cargo.lock') }}
      - name: Doctor
        run: cargo xtask doctor
      - name: Verify contracts and package
        run: cargo xtask dist --tag "$GITHUB_REF_NAME" --output-dir dist
      - name: Verify checksums
        run: (cd dist && sha256sum --check SHA256SUMS)
      - name: Upload release payload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ github.ref_name }}
          path: dist
          retention-days: 14

  publish:
    needs: verify-and-package
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Download verified payload
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-${{ github.ref_name }}
          path: dist
      - name: Verify checksums
        run: (cd dist && sha256sum --check SHA256SUMS)
      - name: Publish or complete release
        shell: bash
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          if gh release view "$tag" >/dev/null 2>&1; then
            mkdir existing
            while IFS= read -r asset; do
              [[ -n "$asset" ]] && gh release download "$tag" --pattern "$asset" --dir existing
            done < <(gh release view "$tag" --json assets --jq '.assets[].name')
            for asset in existing/*; do
              [[ -e "$asset" ]] || continue
              name="${asset##*/}"
              [[ -f "dist/$name" ]] || {
                echo "draft contains unexpected asset $name" >&2
                exit 1
              }
              cmp --silent "dist/$name" "$asset" || {
                echo "draft asset $name differs from verified output" >&2
                exit 1
              }
            done
            draft="$(gh release view "$tag" --json isDraft --jq .isDraft)"
            if [[ "$draft" == "true" ]]; then
              for asset in dist/*; do
                name="${asset##*/}"
                if [[ ! -f "existing/$name" ]]; then
                  gh release upload "$tag" "$asset"
                fi
              done
              rm -rf existing
              mkdir existing
              gh release download "$tag" --pattern '*' --dir existing
            fi
            diff -u \
              <(find dist -maxdepth 1 -type f -printf '%f\n' | sort) \
              <(find existing -maxdepth 1 -type f -printf '%f\n' | sort)
            cmp --silent dist/SHA256SUMS existing/SHA256SUMS || {
              echo "published release has different checksums" >&2
              exit 1
            }
            (cd existing && sha256sum --check SHA256SUMS)
            if [[ "$draft" == "true" ]]; then
              gh release edit "$tag" --draft=false
            fi
            exit 0
          fi

          prerelease=()
          archive="$(find dist -maxdepth 1 -name '*.tar.gz' -print -quit)"
          if tar -xOzf "$archive" --wildcards '*/manifest.json' | jq -e '.prerelease == true' >/dev/null; then
            prerelease=(--prerelease)
          fi
          gh release create "$tag" dist/* \
            --draft \
            --generate-notes \
            "${prerelease[@]}"
          gh release edit "$tag" --draft=false
