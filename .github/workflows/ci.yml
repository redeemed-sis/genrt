name: CI

on:
  pull_request:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install dependencies
        run: scripts/ci/install-ubuntu-deps.sh
      - name: Cache Cargo downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-rust-1.95.0-${{ hashFiles('Cargo.lock') }}
      - name: Doctor
        run: cargo xtask doctor
      - name: Run canonical merge gate
        run: cargo xtask ci
      - name: Add test summary
        if: always()
        run: |
          {
            echo '## AArch64 QEMU suite'
            cat target/test-results/summary.json 2>/dev/null || echo '{"status":"not-produced"}'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload failed QEMU logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qemu-aarch64-test-results
          path: target/test-results
          retention-days: 14
          if-no-files-found: warn
